version: '3.8'

# Nacos 独立启动配置
# 用途：单独启动 Nacos 服务注册中心
# 适用场景：
#   - 本地开发，不想启动完整环境
#   - 已有其他基础设施（MySQL、Redis），只需要 Nacos
#   - 快速测试 Nacos 功能
#
# 使用方式：
#   docker-compose -f docker-compose.nacos.yml up -d
#
# 访问地址：
#   - Nacos 控制台: http://localhost:8848/nacos
#   - 默认账号密码: nacos / nacos

services:
  nacos:
    image: nacos/nacos-server:v2.2.3
    container_name: lite-gateway-nacos
    ports:
      - "8848:8848"
      - "9848:9848"  # Nacos 2.x gRPC 端口
      - "9849:9849"  # Nacos 2.x gRPC 端口
    environment:
      # 单机模式
      - MODE=standalone
      - PREFER_HOST_MODE=hostname
      # 禁用数据库，使用内嵌存储（适合开发和测试）
      - SPRING_DATASOURCE_PLATFORM=
      # JVM 内存配置
      - JVM_XMS=512m
      - JVM_XMX=512m
      - JVM_XMN=256m
    volumes:
      # 持久化数据
      - nacos_data:/home/nacos/data
      - nacos_logs:/home/nacos/logs
    networks:
      - lite-gateway-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  nacos_data:
    driver: local
  nacos_logs:
    driver: local

networks:
  lite-gateway-network:
    driver: bridge
